name: Fetch YouTube Transcripts (fallback drain)

# Fallback-only: intel_monitor.py already attempts live transcript fetches
# inline during each scheduled intel run and drains a few backlog items per
# run itself (see its module docstring) — this workflow just chips away at
# whatever's still left, using a GitHub-hosted runner. This previously ran
# on `runs-on: self-hosted`, but no self-hosted runner was ever registered:
# all 24 scheduled/push runs between 2026-06-17 and 2026-07-24 sat as
# `queued` until GitHub auto-cancelled them — the job never once executed.
# Switched to a GitHub-hosted runner so it actually runs. Note per
# youtube-transcript-api's own error message, cloud-provider IPs (including
# GitHub-hosted runners) are also subject to YouTube's IP-reputation block,
# so this may still only partially succeed on any given run — that's fine,
# it just chips away at the backlog like intel_monitor.py's own drain does.
#
# Triggers:
#   1. When the cloud runner pushes a new/updated transcript-queue.json
#   2. Daily safety net (catches anything missed by push trigger)
on:
  push:
    paths:
      - 'memory/transcript-queue.json'
  schedule:
    - cron: '15 8 * * *'   # 08:15 UTC daily — after the cloud intel run
  workflow_dispatch:        # manual trigger

jobs:
  fetch-transcripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install youtube-transcript-api

      - name: Check queue
        id: queue_check
        run: |
          if [ ! -f memory/transcript-queue.json ]; then
            echo "has_pending=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          COUNT=$(python -c "import json; d=json.load(open('memory/transcript-queue.json')); print(len(d.get('pending', [])))")
          echo "has_pending=$([ $COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "Queue has $COUNT pending transcript(s)"

      - name: Fetch transcripts
        if: steps.queue_check.outputs.has_pending == 'true'
        run: |
          python scripts/fetch_transcripts.py 2>&1

      - name: Commit and push transcripts
        if: steps.queue_check.outputs.has_pending == 'true'
        run: |
          git config user.name  "regime-trader-bot"
          git config user.email "bot@regime-trader"
          git add memory/transcripts/ memory/transcript-queue.json
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "transcripts fetched $(date +%Y-%m-%d)"
          git push origin HEAD
